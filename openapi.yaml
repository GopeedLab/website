openapi: 3.0.3
info:
  title: Gopeed API
  description: |
    Gopeed provides an HTTP API interface for external use, allowing download management through the API.

    ## Authentication

    If you have set an API token in Settings → Advanced → API Token, include it in every request header:

    ```
    X-Api-Token: your-token-here
    ```

    ## Getting Started

    1. Set the communication protocol to TCP in **Settings → Advanced → Communication Protocol**
    2. Configure the IP and port (default: `127.0.0.1:9999`)
    3. Optionally set an API Token for security
    4. Restart Gopeed to apply settings
  version: 1.6.0
  contact:
    name: Gopeed
    url: https://gopeed.com
  license:
    name: GPL-3.0
    url: https://github.com/GopeedLab/gopeed/blob/main/LICENSE

servers:
  - url: http://127.0.0.1:9999
    description: Local Gopeed instance (default)

security:
  - ApiToken: []

tags:
  - name: Tasks
    description: Download task management - create, control, and query download tasks
  - name: Extensions
    description: Extension management - install, configure, and manage Gopeed extensions
  - name: Settings
    description: Application settings and configuration
  - name: Info
    description: Application information and status

paths:
  /api/v1/tasks:
    get:
      tags:
        - Tasks
      summary: Get all tasks
      description: Retrieve a list of all download tasks with optional status filtering.
      operationId: getTasks
      parameters:
        - name: status
          in: query
          description: Filter tasks by status
          schema:
            type: array
            items:
              $ref: '#/components/schemas/TaskStatus'
          style: form
          explode: false
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_TaskList'
    post:
      tags:
        - Tasks
      summary: Create a task
      description: Create a new download task. Supports HTTP, BitTorrent, Magnet links, and more.
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
            examples:
              http:
                summary: HTTP download
                value:
                  req:
                    url: "https://example.com/file.zip"
              magnet:
                summary: Magnet link
                value:
                  req:
                    url: "magnet:?xt=urn:btih:..."
              withOptions:
                summary: HTTP with custom options
                value:
                  req:
                    url: "https://example.com/file.zip"
                    labels: ["important"]
                  opt:
                    path: "/downloads/custom"
                    connections: 8
      responses:
        '200':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_TaskID'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/batch:
    post:
      tags:
        - Tasks
      summary: Create multiple tasks
      description: Create multiple download tasks in a single request.
      operationId: createBatchTasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '200':
          description: Tasks created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_TaskIDList'

  /api/v1/tasks/{id}:
    get:
      tags:
        - Tasks
      summary: Get a task
      description: Retrieve details of a specific download task by ID.
      operationId: getTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_Task'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Tasks
      summary: Delete a task
      description: Delete a specific download task. Optionally remove downloaded files.
      operationId: deleteTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - name: force
          in: query
          description: Also delete downloaded files
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Task deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_Empty'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/{id}/pause:
    put:
      tags:
        - Tasks
      summary: Pause a task
      description: Pause an active download task.
      operationId: pauseTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task paused successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_Empty'

  /api/v1/tasks/{id}/continue:
    put:
      tags:
        - Tasks
      summary: Continue a task
      description: Resume a paused download task.
      operationId: continueTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task resumed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_Empty'

  /api/v1/tasks/pause:
    put:
      tags:
        - Tasks
      summary: Pause all tasks
      description: Pause all currently active download tasks.
      operationId: pauseAllTasks
      responses:
        '200':
          description: All tasks paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_Empty'

  /api/v1/tasks/continue:
    put:
      tags:
        - Tasks
      summary: Continue all tasks
      description: Resume all paused download tasks.
      operationId: continueAllTasks
      responses:
        '200':
          description: All tasks resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_Empty'

  /api/v1/tasks/delete:
    delete:
      tags:
        - Tasks
      summary: Delete all tasks
      description: Delete all download tasks, with an option to remove downloaded files.
      operationId: deleteAllTasks
      parameters:
        - name: force
          in: query
          description: Also delete downloaded files
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: All tasks deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_Empty'

  /api/v1/resolve:
    post:
      tags:
        - Tasks
      summary: Resolve a resource
      description: Resolve a URL to get resource information (file list, size, etc.) before creating a task.
      operationId: resolveTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveRequest'
            examples:
              http:
                summary: Resolve HTTP URL
                value:
                  req:
                    url: "https://example.com/file.zip"
              torrent:
                summary: Resolve magnet link
                value:
                  req:
                    url: "magnet:?xt=urn:btih:..."
      responses:
        '200':
          description: Resource resolved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_ResolveResult'

  /api/v1/extensions:
    get:
      tags:
        - Extensions
      summary: Get all extensions
      description: Retrieve a list of all installed extensions.
      operationId: getExtensions
      responses:
        '200':
          description: List of extensions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_ExtensionList'
    post:
      tags:
        - Extensions
      summary: Install an extension
      description: Install a new extension from a Git repository URL.
      operationId: installExtension
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallExtensionRequest'
            examples:
              install:
                summary: Install from GitHub
                value:
                  url: "https://github.com/gopeed/gopeed-extension-example"
      responses:
        '200':
          description: Extension installed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_Empty'
        '400':
          description: Invalid extension URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/extensions/{identity}:
    get:
      tags:
        - Extensions
      summary: Get an extension
      description: Retrieve details of a specific extension by identity.
      operationId: getExtension
      parameters:
        - $ref: '#/components/parameters/ExtensionIdentity'
      responses:
        '200':
          description: Extension details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_Extension'
        '404':
          description: Extension not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Extensions
      summary: Uninstall an extension
      description: Uninstall and remove a specific extension.
      operationId: uninstallExtension
      parameters:
        - $ref: '#/components/parameters/ExtensionIdentity'
      responses:
        '200':
          description: Extension uninstalled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_Empty'

  /api/v1/extensions/{identity}/settings:
    put:
      tags:
        - Extensions
      summary: Update extension settings
      description: Update the settings for a specific extension.
      operationId: updateExtensionSettings
      parameters:
        - $ref: '#/components/parameters/ExtensionIdentity'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Extension-specific settings key-value pairs
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_Empty'

  /api/v1/extensions/{identity}/update:
    put:
      tags:
        - Extensions
      summary: Update an extension
      description: Check for and install updates for a specific extension.
      operationId: updateExtension
      parameters:
        - $ref: '#/components/parameters/ExtensionIdentity'
      responses:
        '200':
          description: Extension updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_Empty'

  /api/v1/settings:
    get:
      tags:
        - Settings
      summary: Get settings
      description: Retrieve current application settings.
      operationId: getSettings
      responses:
        '200':
          description: Application settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_Settings'
    put:
      tags:
        - Settings
      summary: Update settings
      description: Update application settings.
      operationId: updateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Settings'
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_Empty'

  /api/v1/info:
    get:
      tags:
        - Info
      summary: Get application info
      description: Retrieve application version and build information.
      operationId: getInfo
      security: []
      responses:
        '200':
          description: Application information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_Info'

components:
  securitySchemes:
    ApiToken:
      type: apiKey
      in: header
      name: X-Api-Token
      description: API token set in Settings → Advanced → API Token

  parameters:
    TaskId:
      name: id
      in: path
      required: true
      description: Task ID
      schema:
        type: string
        example: "abc123"
    ExtensionIdentity:
      name: identity
      in: path
      required: true
      description: Extension identity (e.g. `github.com/author/extension-name`)
      schema:
        type: string
        example: "github.com/gopeed/gopeed-extension-example"

  schemas:
    # Enums
    TaskStatus:
      type: string
      enum:
        - ready
        - running
        - pause
        - wait
        - error
        - done
      description: |
        - `ready` - Task is ready to start
        - `running` - Task is actively downloading
        - `pause` - Task is paused
        - `wait` - Task is waiting in queue
        - `error` - Task encountered an error
        - `done` - Task completed successfully

    Protocol:
      type: string
      enum:
        - http
        - bt
      description: Download protocol

    # Request bodies
    CreateTaskRequest:
      type: object
      required:
        - req
      properties:
        req:
          $ref: '#/components/schemas/TaskRequest'
        opt:
          $ref: '#/components/schemas/TaskOptions'

    ResolveRequest:
      type: object
      required:
        - req
      properties:
        req:
          $ref: '#/components/schemas/TaskRequest'

    TaskRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: Resource URL (HTTP, HTTPS, Magnet, or file path for .torrent)
          example: "https://example.com/file.zip"
        labels:
          type: array
          items:
            type: string
          description: Optional labels/tags for the task
          example: ["work", "important"]
        extra:
          type: object
          description: Protocol-specific extra parameters
          properties:
            header:
              type: object
              additionalProperties:
                type: string
              description: Custom HTTP headers (for HTTP downloads)
            ua:
              type: string
              description: Custom User-Agent string

    TaskOptions:
      type: object
      properties:
        path:
          type: string
          description: Custom download directory path
          example: "/downloads/custom"
        name:
          type: string
          description: Custom file name
          example: "my-file.zip"
        selectFiles:
          type: array
          items:
            type: integer
          description: For multi-file downloads (torrent), indices of files to download
        connections:
          type: integer
          description: Number of concurrent connections for this task
          minimum: 1
          maximum: 256
          example: 8

    InstallExtensionRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: Git repository URL of the extension
          example: "https://github.com/gopeed/gopeed-extension-example"

    # Core models
    Task:
      type: object
      properties:
        id:
          type: string
          description: Unique task identifier
          example: "abc123"
        meta:
          $ref: '#/components/schemas/TaskMeta'
        status:
          $ref: '#/components/schemas/TaskStatus'
        progress:
          $ref: '#/components/schemas/TaskProgress'
        size:
          type: integer
          format: int64
          description: Total file size in bytes
          example: 104857600
        createdAt:
          type: string
          format: date-time
          description: Task creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp

    TaskMeta:
      type: object
      properties:
        req:
          $ref: '#/components/schemas/TaskRequest'
        res:
          $ref: '#/components/schemas/ResourceInfo'
        opts:
          $ref: '#/components/schemas/TaskOptions'

    TaskProgress:
      type: object
      properties:
        used:
          type: integer
          format: int64
          description: Time elapsed in milliseconds
          example: 5000
        speed:
          type: integer
          format: int64
          description: Current download speed in bytes per second
          example: 1048576
        downloaded:
          type: integer
          format: int64
          description: Downloaded bytes so far
          example: 52428800

    ResourceInfo:
      type: object
      properties:
        name:
          type: string
          description: Resource name (file or directory name)
          example: "file.zip"
        size:
          type: integer
          format: int64
          description: Total size in bytes
          example: 104857600
        files:
          type: array
          items:
            $ref: '#/components/schemas/ResourceFile'
          description: List of files (for multi-file resources like torrents)

    ResourceFile:
      type: object
      properties:
        name:
          type: string
          description: File name
          example: "file.zip"
        path:
          type: string
          description: File path within the resource
          example: "subdir/file.zip"
        size:
          type: integer
          format: int64
          description: File size in bytes
          example: 104857600

    ResolveResult:
      type: object
      properties:
        id:
          type: string
          description: Resolve result ID (used when creating task from resolve result)
          example: "resolve_abc123"
        res:
          $ref: '#/components/schemas/ResourceInfo'

    Extension:
      type: object
      properties:
        identity:
          type: string
          description: Unique extension identity
          example: "github.com/gopeed/gopeed-extension-example"
        name:
          type: string
          description: Extension display name
          example: "Example Extension"
        author:
          type: string
          description: Extension author
          example: "gopeed"
        title:
          type: string
          description: Extension title
          example: "Gopeed Example Extension"
        description:
          type: string
          description: Extension description
          example: "An example extension for Gopeed"
        icon:
          type: string
          description: Extension icon URL
        homepage:
          type: string
          description: Extension homepage URL
          example: "https://github.com/gopeed/gopeed-extension-example"
        repository:
          $ref: '#/components/schemas/ExtensionRepository'
        scripts:
          type: array
          items:
            $ref: '#/components/schemas/ExtensionScript'
        settings:
          type: array
          items:
            $ref: '#/components/schemas/ExtensionSetting'
        version:
          type: string
          description: Installed version
          example: "1.0.0"
        disabled:
          type: boolean
          description: Whether the extension is disabled

    ExtensionRepository:
      type: object
      properties:
        url:
          type: string
          description: Git repository URL
          example: "https://github.com/gopeed/gopeed-extension-example"

    ExtensionScript:
      type: object
      properties:
        event:
          type: string
          description: Event that triggers this script
          enum:
            - onResolve
        match:
          type: object
          properties:
            urls:
              type: array
              items:
                type: string
              description: URL patterns this script handles
        entry:
          type: string
          description: Script entry file path

    ExtensionSetting:
      type: object
      properties:
        name:
          type: string
          description: Setting key name
        title:
          type: string
          description: Setting display title
        description:
          type: string
          description: Setting description
        type:
          type: string
          enum:
            - string
            - number
            - boolean
          description: Setting value type
        value:
          description: Current setting value
        required:
          type: boolean
          description: Whether this setting is required

    Settings:
      type: object
      properties:
        downloadDir:
          type: string
          description: Default download directory
          example: "/Users/username/Downloads"
        maxRunning:
          type: integer
          description: Maximum number of concurrent running tasks
          minimum: 1
          example: 5
        proxy:
          $ref: '#/components/schemas/ProxySettings'
        speedLimit:
          $ref: '#/components/schemas/SpeedLimit'

    ProxySettings:
      type: object
      properties:
        enable:
          type: boolean
          description: Enable proxy
        scheme:
          type: string
          enum:
            - http
            - https
            - socks5
          description: Proxy protocol
        host:
          type: string
          description: Proxy host
          example: "127.0.0.1"
        port:
          type: integer
          description: Proxy port
          example: 1080
        username:
          type: string
          description: Proxy username (optional)
        password:
          type: string
          description: Proxy password (optional)

    SpeedLimit:
      type: object
      properties:
        enable:
          type: boolean
          description: Enable speed limiting
        upload:
          type: integer
          format: int64
          description: Upload speed limit in bytes per second (0 = unlimited)
          example: 0
        download:
          type: integer
          format: int64
          description: Download speed limit in bytes per second (0 = unlimited)
          example: 10485760

    AppInfo:
      type: object
      properties:
        version:
          type: string
          description: Application version
          example: "1.6.0"
        buildDate:
          type: string
          description: Build date
          example: "2024-01-01"

    # Response wrappers
    Response_Empty:
      type: object
      properties:
        code:
          type: integer
          description: Response code (0 = success)
          example: 0
        msg:
          type: string
          description: Response message
          example: ""
        data:
          type: object
          nullable: true

    Response_TaskID:
      type: object
      properties:
        code:
          type: integer
          example: 0
        msg:
          type: string
          example: ""
        data:
          type: string
          description: Created task ID
          example: "abc123"

    Response_TaskIDList:
      type: object
      properties:
        code:
          type: integer
          example: 0
        msg:
          type: string
          example: ""
        data:
          type: array
          items:
            type: string
          description: List of created task IDs
          example: ["abc123", "def456"]

    Response_Task:
      type: object
      properties:
        code:
          type: integer
          example: 0
        msg:
          type: string
          example: ""
        data:
          $ref: '#/components/schemas/Task'

    Response_TaskList:
      type: object
      properties:
        code:
          type: integer
          example: 0
        msg:
          type: string
          example: ""
        data:
          type: array
          items:
            $ref: '#/components/schemas/Task'

    Response_ResolveResult:
      type: object
      properties:
        code:
          type: integer
          example: 0
        msg:
          type: string
          example: ""
        data:
          $ref: '#/components/schemas/ResolveResult'

    Response_ExtensionList:
      type: object
      properties:
        code:
          type: integer
          example: 0
        msg:
          type: string
          example: ""
        data:
          type: array
          items:
            $ref: '#/components/schemas/Extension'

    Response_Extension:
      type: object
      properties:
        code:
          type: integer
          example: 0
        msg:
          type: string
          example: ""
        data:
          $ref: '#/components/schemas/Extension'

    Response_Settings:
      type: object
      properties:
        code:
          type: integer
          example: 0
        msg:
          type: string
          example: ""
        data:
          $ref: '#/components/schemas/Settings'

    Response_Info:
      type: object
      properties:
        code:
          type: integer
          example: 0
        msg:
          type: string
          example: ""
        data:
          $ref: '#/components/schemas/AppInfo'

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: Error code (non-zero)
          example: 1000
        msg:
          type: string
          description: Error message
          example: "task not found"
        data:
          type: object
          nullable: true
