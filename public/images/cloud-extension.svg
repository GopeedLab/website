<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a9d9a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#79c476;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="1" opacity="0.3" />
  </pattern>
  <rect width="800" height="450" fill="url(#grid)" />

  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="120" fill="#3b82f6" opacity="0.1" filter="url(#glow)" />
  <circle cx="650" cy="350" r="150" fill="#79c476" opacity="0.1" filter="url(#glow)" />

  <!-- Main Card -->
  <g transform="translate(100, 60)" filter="url(#shadow)">
    <!-- Browser Window -->
    <rect x="0" y="0" width="600" height="330" rx="16" fill="url(#cardGrad)" stroke="#334155"
      stroke-width="1" />

    <!-- Browser Header -->
    <path d="M 0 16 C 0 7.163 7.163 0 16 0 L 584 0 C 592.837 0 600 7.163 600 16 L 600 40 L 0 40 Z"
      fill="#0f172a" opacity="0.8" />
    <circle cx="24" cy="20" r="6" fill="#ef4444" />
    <circle cx="44" cy="20" r="6" fill="#eab308" />
    <circle cx="64" cy="20" r="6" fill="#22c55e" />
    <rect x="100" y="12" width="400" height="16" rx="8" fill="#1e293b" />

    <!-- Cloud Storage Header -->
    <g transform="translate(30, 60)">
      <text x="0" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="24"
        font-weight="bold" fill="#ffffff">Cloud Storage</text>

      <!-- Cloud Icons Row -->
      <g transform="translate(0, 40)">
        <!-- Dropbox -->
        <rect x="0" y="0" width="48" height="48" rx="12" fill="#0061ff" opacity="0.9" />
        <path d="M 12 15 L 24 21 L 36 15 L 24 9 Z M 12 27 L 24 33 L 36 27 L 24 21 Z" fill="#ffffff" />

        <!-- Google Drive -->
        <rect x="64" y="0" width="48" height="48" rx="12" fill="#4285f4" opacity="0.9" />
        <path d="M 16 15 L 24 15 L 32 15 L 36 24 L 32 24 L 24 24 L 16 24 Z" fill="#34a853" />
        <path d="M 32 24 L 36 24 L 32 33 L 26 33 Z" fill="#fbbc04" />
        <path d="M 16 24 L 22 33 L 26 33 L 32 24 Z" fill="#ea4335" />

        <!-- OneDrive -->
        <rect x="128" y="0" width="48" height="48" rx="12" fill="#0078d4" opacity="0.9" />
        <path
          d="M 15 21 Q 15 15 21 15 L 33 15 Q 36 15 36 18 L 36 27 Q 36 30 33 30 L 18 30 Q 15 30 15 27 Z"
          fill="#ffffff" />
        <circle cx="30" cy="25" r="4" fill="#0078d4" />

        <!-- Baidu Pan -->
        <rect x="192" y="0" width="48" height="48" rx="12" fill="#2932e1" opacity="0.9" />
        <circle cx="24" cy="21" r="5" fill="#ffffff" />
        <rect x="19" y="21" width="10" height="7" fill="#ffffff" />
      </g>
    </g>

    <!-- Files List -->
    <g transform="translate(30, 170)">
      <!-- File 1 -->
      <rect x="0" y="0" width="540" height="56" rx="8" fill="#0f172a" opacity="0.6" stroke="#334155"
        stroke-width="1" />
      <rect x="16" y="16" width="24" height="24" rx="6" fill="#f59e0b" />
      <text x="28" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="12"
        fill="#ffffff" text-anchor="middle">ZIP</text>
      <text x="56" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="15"
        font-weight="500" fill="#e2e8f0">project-backup-2024.zip</text>
      <text x="360" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="13"
        fill="#94a3b8">2.4 GB</text>

      <!-- File 2 -->
      <rect x="0" y="68" width="540" height="56" rx="8" fill="#0f172a" opacity="0.6"
        stroke="#334155" stroke-width="1" />
      <rect x="16" y="84" width="24" height="24" rx="6" fill="#ef4444" />
      <text x="28" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="12"
        fill="#ffffff" text-anchor="middle">PDF</text>
      <text x="56" y="101" font-family="system-ui, -apple-system, sans-serif" font-size="15"
        font-weight="500" fill="#e2e8f0">annual-report.pdf</text>
      <text x="360" y="101" font-family="system-ui, -apple-system, sans-serif" font-size="13"
        fill="#94a3b8">15.2 MB</text>
    </g>
  </g>
</svg>