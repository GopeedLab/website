<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a9d9a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#79c476;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="1" opacity="0.3" />
  </pattern>
  <rect width="800" height="450" fill="url(#grid)" />

  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="120" fill="#fbbf24" opacity="0.1" filter="url(#glow)" />
  <circle cx="650" cy="350" r="150" fill="#79c476" opacity="0.1" filter="url(#glow)" />

  <!-- Main Card -->
  <g transform="translate(100, 60)" filter="url(#shadow)">
    <!-- Browser Window -->
    <rect x="0" y="0" width="600" height="330" rx="16" fill="url(#cardGrad)" stroke="#334155"
      stroke-width="1" />

    <!-- Browser Header -->
    <path d="M 0 16 C 0 7.163 7.163 0 16 0 L 584 0 C 592.837 0 600 7.163 600 16 L 600 40 L 0 40 Z"
      fill="#0f172a" opacity="0.8" />
    <circle cx="24" cy="20" r="6" fill="#ef4444" />
    <circle cx="44" cy="20" r="6" fill="#eab308" />
    <circle cx="64" cy="20" r="6" fill="#22c55e" />
    <rect x="100" y="12" width="400" height="16" rx="8" fill="#1e293b" />

    <!-- HuggingFace Header -->
    <g transform="translate(30, 60)">
      <circle cx="24" cy="24" r="24" fill="#fbbf24" />
      <!-- Simplified smiling face -->
      <circle cx="16" cy="18" r="3" fill="#1e293b" />
      <circle cx="32" cy="18" r="3" fill="#1e293b" />
      <path d="M 14 28 Q 24 34 34 28" stroke="#1e293b" stroke-width="2.5" fill="none"
        stroke-linecap="round" />

      <text x="70" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="20"
        font-weight="bold" fill="#ffffff">stable-diffusion-xl</text>
      <text x="70" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="14"
        fill="#94a3b8">stabilityai/stable-diffusion-xl-base-1.0</text>
    </g>

    <!-- Files List -->
    <g transform="translate(30, 130)">
      <!-- File 1 -->
      <rect x="0" y="0" width="540" height="48" rx="8" fill="#0f172a" opacity="0.6" stroke="#334155"
        stroke-width="1" />
      <rect x="16" y="16" width="16" height="16" rx="4" fill="#3b82f6" />
      <text x="48" y="29" font-family="monospace" font-size="14" fill="#e2e8f0">model.safetensors</text>
      <text x="380" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="13"
        fill="#94a3b8">6.9 GB</text>

      <!-- File 2 -->
      <rect x="0" y="60" width="540" height="48" rx="8" fill="#0f172a" opacity="0.6"
        stroke="#334155" stroke-width="1" />
      <rect x="16" y="76" width="16" height="16" rx="4" fill="#8b5cf6" />
      <text x="48" y="89" font-family="monospace" font-size="14" fill="#e2e8f0">config.json</text>
      <text x="380" y="89" font-family="system-ui, -apple-system, sans-serif" font-size="13"
        fill="#94a3b8">2.1 KB</text>

      <!-- File 3 -->
      <rect x="0" y="120" width="540" height="48" rx="8" fill="#0f172a" opacity="0.6"
        stroke="#334155" stroke-width="1" />
      <rect x="16" y="136" width="16" height="16" rx="4" fill="#10b981" />
      <text x="48" y="149" font-family="monospace" font-size="14" fill="#e2e8f0">
        tokenizer_config.json</text>
      <text x="380" y="149" font-family="system-ui, -apple-system, sans-serif" font-size="13"
        fill="#94a3b8">1.5 KB</text>
    </g>
  </g>
</svg>