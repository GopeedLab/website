<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="hfBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#hfBg)" />

  <!-- Grid pattern -->
  <pattern id="hfGrid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.1" />
  </pattern>
  <rect width="800" height="450" fill="url(#hfGrid)" />

  <!-- Main Card -->
  <g transform="translate(120, 70)">
    <rect x="0" y="0" width="560" height="310" rx="16" fill="url(#cardGrad)" stroke="#475569"
      stroke-width="2" />

    <!-- HuggingFace logo -->
    <g transform="translate(30, 30)">
      <circle cx="20" cy="20" r="22" fill="#fbbf24" />
      <!-- Simplified smiling face -->
      <circle cx="14" cy="16" r="2" fill="#1e293b" />
      <circle cx="26" cy="16" r="2" fill="#1e293b" />
      <path d="M 12 24 Q 20 28 28 24" stroke="#1e293b" stroke-width="2" fill="none"
        stroke-linecap="round" />
    </g>

    <!-- Model title -->
    <text x="70" y="42" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
      fill="white">
      stable-diffusion-xl
    </text>
    <text x="70" y="62" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">
      stabilityai/stable-diffusion-xl-base-1.0
    </text>

    <!-- Files list -->
    <g transform="translate(30, 100)">
      <!-- File item 1 -->
      <rect x="0" y="0" width="500" height="40" rx="8" fill="#334155" opacity="0.5" />
      <g transform="translate(15, 12)">
        <rect x="0" y="0" width="16" height="16" rx="2" fill="#3b82f6" />
        <text x="7" y="12" font-family="monospace" font-size="10" fill="white" font-weight="bold">F</text>
      </g>
      <text x="45" y="23" font-family="monospace" font-size="14" fill="white">model.safetensors</text>
      <text x="450" y="23" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="end">6.9
        GB</text>

      <!-- File item 2 -->
      <rect x="0" y="50" width="500" height="40" rx="8" fill="#334155" opacity="0.5" />
      <g transform="translate(15, 62)">
        <rect x="0" y="0" width="16" height="16" rx="2" fill="#8b5cf6" />
        <text x="7" y="12" font-family="monospace" font-size="10" fill="white" font-weight="bold">F</text>
      </g>
      <text x="45" y="73" font-family="monospace" font-size="14" fill="white">config.json</text>
      <text x="450" y="73" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="end">2.1
        KB</text>

      <!-- File item 3 -->
      <rect x="0" y="100" width="500" height="40" rx="8" fill="#334155" opacity="0.5" />
      <g transform="translate(15, 112)">
        <rect x="0" y="0" width="16" height="16" rx="2" fill="#10b981" />
        <text x="7" y="12" font-family="monospace" font-size="10" fill="white" font-weight="bold">F</text>
      </g>
      <text x="45" y="123" font-family="monospace" font-size="14" fill="white">tokenizer_config.json</text>
      <text x="450" y="123" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="end">1.5
        KB</text>
    </g>

    <!-- Download button -->
    <g transform="translate(380, 260)">
      <rect x="0" y="0" width="150" height="40" rx="20" fill="#10b981" />
      <g transform="translate(30, 12)">
        <path d="M 8 5 L 8 15 M 4 11 L 8 15 L 12 11" stroke="white" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" fill="none" />
        <path d="M 2 18 L 14 18" stroke="white" stroke-width="2" stroke-linecap="round" />
      </g>
      <text x="85" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
        fill="white" text-anchor="middle">Download</text>
    </g>
  </g>

  <!-- Stats badges -->
  <g transform="translate(680, 390)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#3b82f6" opacity="0.2" />
    <text x="40" y="18" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6"
      text-anchor="middle">● AI Model</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="720" cy="100" r="50" fill="#fbbf24" opacity="0.15" />
  <circle cx="80" cy="400" r="35" fill="#fbbf24" opacity="0.15" />
</svg>