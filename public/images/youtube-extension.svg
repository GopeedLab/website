<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="videoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff0000" stroke-width="0.5" opacity="0.1" />
  </pattern>
  <rect width="800" height="450" fill="url(#grid)" />

  <!-- Video Player Container -->
  <g transform="translate(150, 80)">
    <!-- Main video frame -->
    <rect x="0" y="0" width="500" height="290" rx="12" fill="url(#videoGrad)" stroke="#475569"
      stroke-width="2" />

    <!-- YouTube logo area -->
    <circle cx="60" cy="40" r="28" fill="#ff0000" />
    <path d="M 55 32 L 55 48 L 67 40 Z" fill="white" />

    <!-- Video title bar -->
    <rect x="20" y="220" width="300" height="12" rx="6" fill="#64748b" opacity="0.6" />
    <rect x="20" y="240" width="200" height="8" rx="4" fill="#64748b" opacity="0.4" />

    <!-- Download icon -->
    <g transform="translate(420, 230)">
      <circle cx="20" cy="20" r="24" fill="#10b981" opacity="0.9" />
      <path d="M 20 12 L 20 24 M 15 19 L 20 24 L 25 19" stroke="white" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <path d="M 12 28 L 28 28" stroke="white" stroke-width="2.5" stroke-linecap="round" />
    </g>

    <!-- Quality badges -->
    <g transform="translate(350, 30)">
      <rect x="0" y="0" width="60" height="24" rx="12" fill="#3b82f6" opacity="0.9" />
      <text x="30" y="16" font-family="Arial, sans-serif" font-size="12" font-weight="bold"
        fill="white" text-anchor="middle">4K</text>
    </g>

    <g transform="translate(420, 30)">
      <rect x="0" y="0" width="60" height="24" rx="12" fill="#8b5cf6" opacity="0.9" />
      <text x="30" y="16" font-family="Arial, sans-serif" font-size="12" font-weight="bold"
        fill="white" text-anchor="middle">HD</text>
    </g>
  </g>

  <!-- Playlist items -->
  <g transform="translate(150, 390)">
    <rect x="0" y="0" width="150" height="8" rx="4" fill="#64748b" opacity="0.5" />
    <rect x="160" y="0" width="150" height="8" rx="4" fill="#64748b" opacity="0.5" />
    <rect x="320" y="0" width="150" height="8" rx="4" fill="#64748b" opacity="0.5" />
  </g>

  <!-- Decorative elements -->
  <circle cx="700" cy="80" r="40" fill="#ff0000" opacity="0.15" />
  <circle cx="100" cy="400" r="30" fill="#ff0000" opacity="0.15" />
</svg>