<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a9d9a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#79c476;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="1" opacity="0.3" />
  </pattern>
  <rect width="800" height="450" fill="url(#grid)" />

  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="120" fill="#ef4444" opacity="0.1" filter="url(#glow)" />
  <circle cx="650" cy="350" r="150" fill="#79c476" opacity="0.1" filter="url(#glow)" />

  <!-- Main Video Player Card -->
  <g transform="translate(100, 60)" filter="url(#shadow)">
    <!-- Browser Window -->
    <rect x="0" y="0" width="600" height="330" rx="16" fill="url(#cardGrad)" stroke="#334155"
      stroke-width="1" />

    <!-- Browser Header -->
    <path d="M 0 16 C 0 7.163 7.163 0 16 0 L 584 0 C 592.837 0 600 7.163 600 16 L 600 40 L 0 40 Z"
      fill="#0f172a" opacity="0.8" />
    <circle cx="24" cy="20" r="6" fill="#ef4444" />
    <circle cx="44" cy="20" r="6" fill="#eab308" />
    <circle cx="64" cy="20" r="6" fill="#22c55e" />
    <rect x="100" y="12" width="400" height="16" rx="8" fill="#1e293b" />

    <!-- Video Area -->
    <rect x="20" y="60" width="560" height="200" rx="8" fill="#000000" />

    <!-- YouTube Logo Abstract -->
    <rect x="260" y="130" width="80" height="56" rx="16" fill="#ef4444" />
    <path d="M 295 146 L 295 170 L 315 158 Z" fill="#ffffff" />

    <!-- Video Progress Bar -->
    <rect x="40" y="240" width="520" height="4" rx="2" fill="#334155" />
    <rect x="40" y="240" width="200" height="4" rx="2" fill="#ef4444" />
    <circle cx="240" cy="242" r="6" fill="#ef4444" />

    <!-- Video Info -->
    <rect x="20" y="280" width="300" height="16" rx="4" fill="#e2e8f0" opacity="0.9" />
    <rect x="20" y="305" width="150" height="10" rx="4" fill="#94a3b8" opacity="0.6" />
  </g>
</svg>